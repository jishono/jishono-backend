services:
  jishono-api:
    build: 
      context: .
      pull: true 
    restart: always
    environment:
      - DB_HOST_NODE=${DB_HOST_NODE}
      - DB_PORT_NODE=${DB_PORT_NODE}
      - DB_USER_ADMIN_NODE=${DB_USER_ADMIN_NODE}
      - DB_NAME_NODE=${DB_NAME_NODE}
      - DB_PASS_ADMIN_NODE=${DB_PASS_ADMIN_NODE}
      - NODE_ENV=${NODE_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - NODEMAILER_ENABLED=${NODEMAILER_ENABLED}
      - NODEMAILER_SMTP_HOST=${NODEMAILER_SMTP_HOST}
      - NODEMAILER_SMTP_PORT=${NODEMAILER_SMTP_PORT}
      - NODEMAILER_USER=${NODEMAILER_USER}
      - NODEMAILER_PASSWORD=${NODEMAILER_PASSWORD}
      - DATABASE_URL=postgres://${DB_USER_ADMIN_NODE}:${DB_PASS_ADMIN_NODE}@${DB_HOST_NODE}:${DB_PORT_NODE}/${DB_NAME_NODE}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    ports:
      - 3001:3001
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: 1.0
    pids_limit: 100